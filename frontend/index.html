        function resolveQueuedJobs(newDone, newFailed) {
            for (let i = 0; i < jobHistory.length; i++) {
                if (jobHistory[i].status === 'queued') {
                    if (newDone > 0) {
                        jobHistory[i].status = 'done';
                        jobHistory[i].worker = '#auto';
                        newDone--;
                    } else if (newFailed > 0) {
                        jobHistory[i].status = 'failed';
                        jobHistory[i].worker = '#auto';
                        newFailed--;
                    }
                }
            }

            localStorage.setItem('wq_jobs', JSON.stringify(jobHistory));
        }
